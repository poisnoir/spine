name: Release

# Runs on every push to main, but only bumps/tags/releases if the HEAD
# commit's message contains "[release]" (case-insensitive) - e.g.
# "add unregister rollback [release]". Tests still run on every push
# regardless, so main stays continuously verified either way. One shared
# version for the whole repo - client-go and the Zig side
# (spined/squid/client-zig) are versioned and tagged together, matching the
# existing single v0.1.0 tag from before the Go/Zig split.
on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  release:
    name: Bump version and tag
    needs: test
    if: contains(github.event.head_commit.message, '[release]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history - semantic-version scans commits since the last tag
          persist-credentials: true

      # Defaults to a patch bump. Put #major or #minor anywhere in a commit
      # message (since the last tag) to bump that instead - e.g. a commit
      # titled "reorder node registration to talk to spined first #minor".
      - name: Compute next version
        id: version
        uses: paulhatch/semantic-version@v6.0.3
        with:
          tag_prefix: "v"
          major_pattern: "#major"
          minor_pattern: "#minor"
          version_format: "${major}.${minor}.${patch}"

      - name: Sync build.zig.zon version
        run: |
          sed -i "s/\.version = \"[0-9][0-9.]*\"/.version = \"${{ steps.version.outputs.version }}\"/" build.zig.zon
          grep '.version' build.zig.zon

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add build.zig.zon
          git diff --cached --quiet && echo "build.zig.zon already at this version, nothing to commit" || \
            git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:main

      # client-go/vX.Y.Z is not cosmetic: Go's module resolution requires a
      # git tag prefixed with the subdirectory for a module that isn't at
      # the repo root (https://go.dev/ref/mod#vcs-version) - without it,
      # `go get github.com/poisnoir/spine-go/client-go@vX.Y.Z` fails with
      # "unknown revision" even though the plain vX.Y.Z tag resolves fine
      # for squid/spined/spine-uart/client-zig. Both tags point at the same
      # commit; this is still one shared version number, just two refs to it.
      - name: Tag release
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git tag "client-go/v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}" "client-go/v${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          generate_release_notes: true

  build-binaries:
    name: Build release binaries (${{ matrix.name }})
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - zig_target: x86_64-linux-gnu
            name: linux-x86_64
          - zig_target: aarch64-linux-gnu
            name: linux-aarch64
          - zig_target: x86_64-macos
            name: macos-x86_64
          - zig_target: aarch64-macos
            name: macos-aarch64
    steps:
      - uses: actions/checkout@v7
        with:
          ref: "v${{ needs.release.outputs.version }}"

      - uses: mlugg/setup-zig@v2

      # Zig cross-compiles natively (its own bundled libc/SDK headers, no
      # target toolchain to install) - one Linux runner builds every
      # platform, spined/squid/spine_uart/spine/spine_bench alike.
      - run: zig build -Dtarget=${{ matrix.zig_target }} -Doptimize=ReleaseFast

      - name: Package
        run: |
          tar_name="spine-v${{ needs.release.outputs.version }}-${{ matrix.name }}.tar.gz"
          tar -czf "$tar_name" -C zig-out/bin .
          echo "TARBALL=$tar_name" >> "$GITHUB_ENV"

      - name: Attach to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ needs.release.outputs.version }}"
          files: ${{ env.TARBALL }}
